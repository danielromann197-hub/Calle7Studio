<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Acceso Restringido - Calle 7 Studio</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/portal.css" />
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Logo -->
        <div class="login-brand">
            <img src="assets/logo.png" alt="Calle 7 Studio" class="login-logo">
            <p class="login-subtitle">ACCESO AL SISTEMA CENTRAL</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <input type="email" id="email" required placeholder=" " autocomplete="email">
                <label for="email">Correo Electrónico</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required placeholder=" " autocomplete="current-password">
                <label for="password">Contraseña</label>
            </div>

            <div class="error-msg" id="errorMsg" style="display: none;">Credenciales incorrectas o usuario no encontrado.</div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">INICIAR SESIÓN</span>
                <span class="btn-loader" style="display: none;"></span>
            </button>
        </form>

        <a href="index.html" class="back-link">Volver al sitio público</a>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script type="module" src="assets/firebase-config.js"></script>
    <script type="module" src="assets/login.js"></script>
</body>
</html>
